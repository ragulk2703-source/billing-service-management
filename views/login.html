<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing Service Management - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .login-container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      max-width: 450px;
      width: 100%;
      padding: 40px;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .login-header h1 {
      font-size: 28px;
      color: #333;
      font-weight: 700;
      margin-bottom: 10px;
    }
    
    .login-header p {
      color: #666;
      font-size: 14px;
    }
    
    .form-control {
      border-radius: 5px;
      border: 1px solid #ddd;
      padding: 12px 15px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    
    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }
    
    .login-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 5px;
      padding: 12px;
      width: 100%;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    
    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    
    .alert {
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
    }
    
    .alert.show {
      display: block;
    }
    
    .demo-credentials {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 5px;
      margin-top: 20px;
      font-size: 13px;
    }
    
    .demo-credentials p {
      margin: 5px 0;
      color: #555;
    }
    
    .demo-credentials strong {
      color: #333;
    }
    
    .loading {
      display: none;
    }
    
    .loading.show {
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🔧 Service Center</h1>
      <p>Billing & Service Management</p>
    </div>
    
    <div id="alertBox" class="alert"></div>
    
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
      </div>
      
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
      </div>
      
      <button type="submit" class="login-btn" id="loginBtn">
        <span id="btnText">Sign In</span>
        <span class="spinner-border spinner-border-sm loading" id="spinner"></span>
      </button>
    </form>
    
    <div class="demo-credentials">
      <p><strong>Demo Credentials:</strong></p>
      <p>📧 Email: <code>admin@servicecentre.com</code></p>
      <p>🔐 Password: <code>Admin@123456</code></p>
      <p style="color: #e74c3c; margin-top: 10px; font-weight: 600;">⚠️ Change password after first login</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const spinner = document.getElementById('spinner');
    const alertBox = document.getElementById('alertBox');
    const btnText = document.getElementById('btnText');

    // Show alert
    function showAlert(message, type = 'danger') {
      alertBox.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>`;
      alertBox.classList.add('show');
    }

    // Hide alert
    function hideAlert() {
      alertBox.classList.remove('show');
    }

    // Handle login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      hideAlert();
      loginBtn.disabled = true;
      spinner.classList.add('show');
      btnText.textContent = 'Signing in...';
      
      try {
        const response = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('refreshToken', data.data.refreshToken);
          localStorage.setItem('user', JSON.stringify(data.data.user));
          
          showAlert('✅ Login successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 1500);
        } else {
          showAlert('❌ ' + data.message, 'danger');
        }
      } catch (error) {
        showAlert('❌ Connection error: ' + error.message, 'danger');
      } finally {
        loginBtn.disabled = false;
        spinner.classList.remove('show');
        btnText.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
